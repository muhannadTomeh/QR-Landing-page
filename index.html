<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect With Us</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .container {
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px;
      margin: 15px 0;
      border-radius: 12px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s ease;
      color: white;
    }

    .whatsapp {
      background-color: #25D366;
    }

    .instagram {
      background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
    }

    .social-btn:hover {
      transform: scale(1.05);
    }

    .icon {
      width: 24px;
      height: 24px;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Connect With Us</h1>

    <!-- Replace the links below with your real accounts -->
    <a href="https://wa.me/972592137050" target="_blank" class="social-btn whatsapp">
      <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp" />
      WhatsApp
    </a>

    <a href="https://www.instagram.com/smartmedia.store/" target="_blank" class="social-btn instagram">
      <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" />
      Instagram
    </a>

    <div class="footer">
      Scan the QR to contact us instantly
    </div>
  </div>
</body>
</html>
